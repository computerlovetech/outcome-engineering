# Outcome Engineering stack. Coolify (or any external reverse proxy) provides
# HTTPS in front of `frontend` (and optionally `api`/`mcp`); nothing here
# terminates TLS. Defaults give a working local dev stack in simulation auth:
#
#   docker compose up --build
#   open http://localhost:3000  (sign in with any dev token, e.g. "dev")
#
# Real OIDC: set OE_AUTH_MODE=oidc + the OE_OIDC_* vars, and enable the auth
# profile (docker compose --profile auth up) to put oauth2-proxy in front of
# the frontend.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oe}
      POSTGRES_DB: ${POSTGRES_DB:-oe}
    volumes:
      - oe-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oe} -d ${POSTGRES_DB:-oe}"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    environment:
      OE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-oe}:${POSTGRES_PASSWORD:-oe}@postgres:5432/${POSTGRES_DB:-oe}
      OE_AUTH_MODE: ${OE_AUTH_MODE:-simulation}
      OE_OIDC_ISSUER: ${OE_OIDC_ISSUER:-}
      OE_OIDC_JWKS_URL: ${OE_OIDC_JWKS_URL:-}
      OE_OIDC_AUDIENCE: ${OE_OIDC_AUDIENCE:-}
      OE_CORS_ORIGINS: ${OE_CORS_ORIGINS:-*}
    ports:
      - "${OE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build:
      context: ./api
      dockerfile: Dockerfile.mcp
    environment:
      OE_MCP_API_URL: http://api:8000
    ports:
      - "${OE_MCP_PORT:-8001}:8001"
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${OE_FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

  # OIDC login for the web UI. Enable with: docker compose --profile auth up
  # Point your provider's callback at https://<host>/oauth2/callback and expose
  # this service (port 4180) instead of `frontend` through Coolify.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    profiles: [auth]
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OE_OIDC_ISSUER:-}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: http://frontend:3000
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL:-}
    ports:
      - "${OE_AUTH_PORT:-4180}:4180"
    depends_on:
      - frontend

volumes:
  oe-data:
